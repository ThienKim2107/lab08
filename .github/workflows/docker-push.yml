name: Docker Image CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push MVC App
        uses: docker/build-push-action@v4
        with:
          context: ./SchoolAppCoreMVC/SchoolAppCoreMVC
          push: true
          tags: 521h0092-vothithienkim/schoolappcoremvc:latest

      - name: Build and push Razor App
        uses: docker/build-push-action@v4
        with:
          context: ./Exercise1_RazorPages/SchoolAppCoreRazor/SchoolAppCoreRazor
          push: true
          tags: 521h0092-vothithienkim/schoolappcorerazor:latest

